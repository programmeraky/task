<div class="card-container">
  <mat-card class="form-card">
    <mat-card-title-group>
      <mat-card-title class="p-20">Add Product</mat-card-title>
    </mat-card-title-group>

    <mat-card-content>
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()">

        <mat-form-field class="form-field">
          <mat-label>Product Name</mat-label>
          <input matInput placeholder="Product Name" formControlName="name" required>
          <mat-error *ngIf="productForm.get('name')?.hasError('required')">Product name is required</mat-error>
        </mat-form-field>

        <mat-form-field class="form-field">
          <mat-label>SKU</mat-label>
          <input matInput placeholder="sku" formControlName="sku" required>
          <mat-error *ngIf="productForm.get('sku')?.hasError('required')">SKU is required</mat-error>
        </mat-form-field>

        <mat-form-field class="form-field">
          <mat-label>Price</mat-label>
          <input matInput placeholder="price" formControlName="price" required>
          <mat-error *ngIf="productForm.get('price')?.hasError('required')">Price is required</mat-error>
        </mat-form-field>

        <mat-form-field class="form-field">
          <mat-label>Stock</mat-label>
          <input matInput placeholder="stock" formControlName="stock" required>
          <mat-error *ngIf="productForm.get('stock')?.hasError('required')">Stock is required</mat-error>
        </mat-form-field>

        <mat-form-field class="form-field">
          <mat-label>Discount(%)</mat-label>
          <input matInput placeholder="stock" formControlName="dis_per">
        </mat-form-field>

        <mat-form-field class="form-field">
          <mat-label>Discount (Price)</mat-label>
          <input matInput placeholder="stock" formControlName="dis_price">
        </mat-form-field>

        <mat-form-field class="form-field">
          <mat-label>Description</mat-label>
          <textarea matInput placeholder="Description" formControlName="desc" required></textarea>
          <mat-error *ngIf="productForm.get('desc')?.hasError('required')">Description is required</mat-error>
        </mat-form-field>

        <mat-form-field class="form-field">
          <mat-label>Status</mat-label>
          <mat-select formControlName="status" required>
            <mat-option value="Draft">Draft</mat-option>
            <mat-option value="Publish">Publish</mat-option>
            <mat-option value="Archived">Archived</mat-option>
          </mat-select>
          <mat-error *ngIf="productForm.get('status')?.hasError('required')">Status is required</mat-error>
        </mat-form-field>

        <mat-form-field class="form-field">
          <mat-label>Date</mat-label>
          <input matInput [matDatepicker]="picker" placeholder="Date" formControlName="date" required>
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
          <mat-error *ngIf="productForm.get('date')?.hasError('required')">Date is required</mat-error>
        </mat-form-field>

        <!-- <mat-form-field class="form-field">
          <mat-label>Category</mat-label>
          <input matInput placeholder="Category" formControlName="category" required>
          <mat-error *ngIf="productForm.get('category')?.hasError('required')">Category is required</mat-error>
        </mat-form-field> -->

        <button mat-raised-button color="primary" type="submit" [disabled]="productForm.invalid">Save</button>
        <button mat-raised-button color="warn" type="button" (click)="onCancel()">Cancel</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
